name: Deploy to Hugging Face Space

# 每次 push 到 main → 自動把目前內容上傳到 HF Space，Space 會重新 build 部署。
# 需在 GitHub repo 設定 secret：HF_TOKEN（HF 寫入權杖）。見 DEPLOY.md。
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 huggingface_hub
        run: pip install -q huggingface_hub

      - name: 上傳到 Hugging Face Space（大檔自動走 LFS）
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then echo "未設定 HF_TOKEN secret，跳過自動同步。"; exit 0; fi
          cat deploy/hf-readme-header.md README.md > README.tmp && mv README.tmp README.md
          python deploy/push_to_space.py
